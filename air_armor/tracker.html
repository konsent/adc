<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR & ARMOR — Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #2a2e26;
  --surface:  #343830;
  --surface2: #3c4038;
  --border:   #4e5445;
  --border2:  #606858;
  --text:     #d8dcc4;
  --text-dim: #8a9278;
  --nato:     #d4ae55;
  --wp:       #8b1a1a;
  --wp-bright:#c0392b;
  --green:    #6a8e48;
  --green-lt: #90b860;
  --mono: 'Noto Sans KR', 'Share Tech Mono', sans-serif;
  --title: 'Noto Sans KR', 'Oswald', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-size: 17px;
}
body {
  display: flex;
  flex-direction: column;
}
header {
  background: var(--surface);
  border-bottom: 2px solid var(--nato);
  padding: 9px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
header h1 {
  font-family: var(--title);
  font-size: 1.1rem;
  color: var(--nato);
  letter-spacing: 4px;
  font-weight: 700;
  text-transform: uppercase;
}
header a { color: var(--green-lt); text-decoration: none; font-size: 0.8rem; }
header a:hover { color: var(--nato); }
#reset-turn-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  padding: 6px 14px;
  cursor: pointer;
}
#reset-turn-btn:hover { border-color: var(--nato); color: var(--nato); }

main {
  display: flex;
  gap: 14px;
  padding: 10px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.faction-panel {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.faction-nato { border-top: 3px solid var(--nato); }
.faction-wp { border-top: 3px solid var(--wp); }
.faction-panel h2 { font-family: var(--title); margin-bottom: 8px; }
.faction-nato h2 { color: var(--nato); }
.faction-wp h2 { color: var(--wp-bright); }
.division-title {
  font-family: var(--title);
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}
.divisions-row .hq-row {
  gap: 8px;
  padding: 4px 0;
  font-size: 0.88rem;
}
.divisions-row .hq-row-indent { padding-left: 18px; }
.divisions-row .hq-name { min-width: 70px; }
.divisions-row .track-wrap { gap: 4px; }
.divisions-row .track-wrap .label { font-size: 0.68rem; width: 16px; }
.divisions-row .track-cell { width: 28px; height: 28px; font-size: 0.82rem; }
.divisions-row .track-cells { gap: 3px; }

.group-box {
  border: 1px solid var(--surface2);
  padding: 8px 12px;
  margin-bottom: 8px;
}

.divisions-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 8px;
}
.divisions-row .group-box { margin-bottom: 0; }

.hq-row, .offmap-row, .sam-row, .vp-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 5px 0;
  border-bottom: 1px solid var(--surface2);
  flex-wrap: nowrap;
}
.hq-row-indent { padding-left: 22px; }
.hq-row-indent .hq-name { font-weight: 400; color: var(--text-dim); }
.unit-b1_3 .hq-name   { color: #7a8c5a; }
.unit-b2_3 .hq-name   { color: #8b6347; }
.unit-b3_3 .hq-name   { color: #7b5fa0; }
.unit-acr_2_11 .hq-name { color: #5aadcc; }
.unit-b34_12 .hq-name { color: #7ab857; }
.unit-b35_12 .hq-name { color: #9b80c8; }
.unit-b36_12 .hq-name { color: #d4813a; }

.unit-b1_3    .track-cell.active { background: #7a8c5a; border-color: #7a8c5a; color: #fff; }
.unit-b1_3    .track-cell:hover  { border-color: #7a8c5a; color: #7a8c5a; }
.unit-b2_3    .track-cell.active { background: #8b6347; border-color: #8b6347; color: #fff; }
.unit-b2_3    .track-cell:hover  { border-color: #8b6347; color: #8b6347; }
.unit-b3_3    .track-cell.active { background: #7b5fa0; border-color: #7b5fa0; color: #fff; }
.unit-b3_3    .track-cell:hover  { border-color: #7b5fa0; color: #7b5fa0; }
.unit-acr_2_11 .track-cell.active { background: #5aadcc; border-color: #5aadcc; color: #fff; }
.unit-acr_2_11 .track-cell:hover  { border-color: #5aadcc; color: #5aadcc; }
.unit-b34_12  .track-cell.active { background: #7ab857; border-color: #7ab857; color: #fff; }
.unit-b34_12  .track-cell:hover  { border-color: #7ab857; color: #7ab857; }
.unit-b35_12  .track-cell.active { background: #9b80c8; border-color: #9b80c8; color: #fff; }
.unit-b35_12  .track-cell:hover  { border-color: #9b80c8; color: #9b80c8; }
.unit-b36_12  .track-cell.active { background: #d4813a; border-color: #d4813a; color: #fff; }
.unit-b36_12  .track-cell:hover  { border-color: #d4813a; color: #d4813a; }

.unit-ca_4cmbg .hq-name { color: #CC9092; }
.unit-ca_4cmbg .track-cell.active { background: #CC9092; border-color: #CC9092; color: #2a2e26; }
.unit-ca_4cmbg .track-cell:hover  { border-color: #CC9092; color: #CC9092; }
.unit-wg_54hsb .hq-name { color: #c8bfa0; }
.unit-wg_54hsb .track-cell.active { background: #c8bfa0; border-color: #c8bfa0; color: #2a2e26; }
.unit-wg_54hsb .track-cell:hover  { border-color: #c8bfa0; color: #c8bfa0; }
.unit-wg_26ll  .hq-name { color: #96a890; }
.unit-wg_26ll  .track-cell.active { background: #96a890; border-color: #96a890; color: #2a2e26; }
.unit-wg_26ll  .track-cell:hover  { border-color: #96a890; color: #96a890; }
.group-box .hq-row:last-child,
.group-box .offmap-row:last-child,
.group-box .sam-row:last-child,
.group-box .vp-row:last-child {
  border-bottom: none;
}
.hq-name { min-width: 80px; font-weight: 600; }
.track-wrap { display: flex; align-items: center; gap: 6px; }
.track-wrap .label { font-size: 0.72rem; color: var(--text-dim); width: 20px; }

.track-cells { display: flex; gap: 4px; }
.track-cell {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.9rem;
  width: 32px;
  height: 32px;
  cursor: pointer;
}
.track-cell:hover { border-color: var(--nato); color: var(--nato); }
.track-cell.active { background: var(--nato); color: var(--bg); font-weight: 700; border-color: var(--nato); }
.faction-wp .track-cell.active { background: var(--wp-bright); color: #fff; border-color: var(--wp-bright); }

.cs-section { display: flex; flex-wrap: wrap; gap: 6px; }
.cs-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  border: 1px solid var(--surface2);
  padding: 5px 8px;
  flex: 1 1 calc(50% - 6px);
  min-width: 200px;
}
.cs-label { font-size: 0.85rem; }

.counter-ctrl { display: flex; align-items: center; gap: 0; }
.counter-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.9rem;
  width: 32px;
  height: 32px;
  cursor: pointer;
}
.counter-btn:hover { border-color: var(--nato); color: var(--nato); }
.counter-val {
  font-weight: 700;
  color: var(--nato);
  min-width: 34px;
  text-align: center;
  border-top: 1px solid var(--border2);
  border-bottom: 1px solid var(--border2);
  height: 32px;
  line-height: 32px;
}
.faction-wp .counter-val { color: var(--wp-bright); }
</style>
</head>
<body>

<header>
  <h1>▶ AIR &amp; ARMOR · TRACKER</h1>
  <div>
    <button id="reset-turn-btn">RP/CP/Offmap 리셋</button>
    <a href="index.html">◀ SOP로 돌아가기</a>
  </div>
</header>

<main>
  <div id="panel-nato"></div>
  <div id="panel-wp"></div>
</main>

<script src="tracker-data.js"></script>
<script src="tracker.js"></script>
<script>
  initTrackerPage();
</script>
</body>
</html>
