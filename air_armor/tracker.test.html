<!-- air_armor/tracker.test.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tracker Tests</title>
<style>
  body { font-family: monospace; background: #111; color: #ddd; padding: 20px; }
  .pass { color: #6a8e48; }
  .fail { color: #c0392b; font-weight: bold; }
</style>
</head>
<body>
<h1>Tracker Unit Tests</h1>
<div id="results"></div>

<script src="tracker-data.js"></script>
<script src="tracker.js"></script>
<script>
const results = document.getElementById('results');
let passCount = 0, failCount = 0;

function assertEqual(actual, expected, label) {
  const ok = JSON.stringify(actual) === JSON.stringify(expected);
  const line = document.createElement('div');
  line.className = ok ? 'pass' : 'fail';
  line.textContent = (ok ? 'PASS ' : 'FAIL ') + label +
    (ok ? '' : ` — expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  results.appendChild(line);
  ok ? passCount++ : failCount++;
}

// --- createDefaultState ---
const state = createDefaultState();
assertEqual(state.nato.hqs.ca_4cmbg.rp, 0, 'default RP is 0');
assertEqual(state.nato.hqs.ca_4cmbg.cp, 0, 'default CP is 0');
assertEqual(state.nato.offmap.cp, 0, 'default offmap CP is 0');
assertEqual(state.nato.cs.nato.mine, 0, 'default CSP mine is 0');
assertEqual(state.wp.offmap.rp, 0, 'default WP offmap RP is 0');
assertEqual(state.nato.sam, 1, 'default SAM strength is 1');
assertEqual(state.nato.vp, 0, 'default VP is 0');

// --- saveState / loadState round-trip ---
localStorage.removeItem('airArmorTrackerState');
state.nato.hqs.ca_4cmbg.rp = 2;
saveState(state);
const loaded = loadState();
assertEqual(loaded.nato.hqs.ca_4cmbg.rp, 2, 'loadState restores saved value');

// --- division units in default state ---
assertEqual(state.nato.divisions.us_3rd_inf.units.fwd.cp, 0, 'default 3rd Inf Fwd HQ CP is 0');
assertEqual(state.nato.divisions.us_3rd_inf.units.mn.rp, 0, 'default 3rd Inf Mn HQ RP is 0');
assertEqual(state.nato.divisions.us_3rd_inf.units.b1_3.rp, 0, 'default 3rd Inf 1/3 RP is 0');
assertEqual(state.nato.divisions.wg_12th_pz.units.mn.cp, 0, 'default 12th Pz Mn HQ CP is 0');
assertEqual(state.nato.divisions.wg_12th_pz.units.b34_12.cp, 0, 'default 12th Pz 34/12 CP is 0');

// --- loadState with no prior save returns defaults ---
localStorage.removeItem('airArmorTrackerState');
const fresh = loadState();
assertEqual(fresh.nato.hqs.ca_4cmbg.rp, 0, 'loadState falls back to defaults when empty');

// --- loadState migrates old schema missing newer fields (e.g. divisions) ---
localStorage.setItem('airArmorTrackerState', JSON.stringify({
  nato: {
    hqs: { ca_4cmbg: { rp: 2, cp: 1 } },
    offmap: { cp: 1, rp: 0 },
    cs: { nato: { mine: 5 } },
    vp: 3,
    sam: 2
  },
  wp: {}
}));
const migrated = loadState();
assertEqual(migrated.nato.hqs.ca_4cmbg.rp, 2, 'migration preserves existing saved value');
assertEqual(migrated.nato.vp, 3, 'migration preserves saved VP');
assertEqual(migrated.nato.divisions.us_3rd_inf.units.fwd.cp, 0, 'migration backfills missing divisions field with defaults');
assertEqual(migrated.nato.cs.nato.adm, 0, 'migration backfills missing CSP type with default');
assertEqual(migrated.wp.offmap.cp, 0, 'migration backfills entirely missing faction state with defaults');
localStorage.removeItem('airArmorTrackerState');

// --- clampCounter ---
assertEqual(clampCounter(-1), 0, 'clampCounter prevents negative');
assertEqual(clampCounter(5), 5, 'clampCounter allows positive');

// --- resetTurnTracks ---
localStorage.removeItem('airArmorTrackerState');
const s2 = createDefaultState();
s2.nato.hqs.ca_4cmbg.rp = 2;
s2.nato.hqs.ca_4cmbg.cp = 1;
s2.nato.divisions.us_3rd_inf.units.fwd.cp = 1;
s2.nato.divisions.us_3rd_inf.units.b1_3.rp = 1;
s2.nato.divisions.wg_12th_pz.units.b34_12.cp = 2;
s2.nato.offmap.cp = 1;
s2.wp.offmap.rp = 1;
s2.nato.cs.nato.mine = 3;
s2.nato.vp = 2;
s2.nato.sam = 3;
resetTurnTracks(s2);
assertEqual(s2.nato.hqs.ca_4cmbg.rp, 0, 'reset zeroes HQ RP');
assertEqual(s2.nato.hqs.ca_4cmbg.cp, 0, 'reset zeroes HQ CP');
assertEqual(s2.nato.divisions.us_3rd_inf.units.fwd.cp, 0, 'reset zeroes 3rd Inf Fwd HQ CP');
assertEqual(s2.nato.divisions.us_3rd_inf.units.b1_3.rp, 0, 'reset zeroes 3rd Inf 1/3 RP');
assertEqual(s2.nato.divisions.wg_12th_pz.units.b34_12.cp, 0, 'reset zeroes 12th Pz 34/12 CP');
assertEqual(s2.nato.offmap.cp, 0, 'reset zeroes offmap CP');
assertEqual(s2.wp.offmap.rp, 0, 'reset zeroes WP offmap RP');
assertEqual(s2.nato.cs.nato.mine, 3, 'reset leaves CSP untouched');
assertEqual(s2.nato.vp, 2, 'reset leaves VP untouched');
assertEqual(s2.nato.sam, 3, 'reset leaves SAM untouched');

// --- renderTrackCells ---
const container = document.createElement('div');
renderTrackCells(container, 2, 1, (newVal) => { container.dataset.clicked = newVal; });
assertEqual(container.querySelectorAll('.track-cell').length, 3, 'renderTrackCells creates max+1 cells');
assertEqual(container.querySelector('.track-cell.active').textContent, '1', 'active cell matches current value');
container.querySelectorAll('.track-cell')[2].click();
assertEqual(container.dataset.clicked, '2', 'clicking a cell invokes callback with that value');

// --- renderCounter ---
const counterEl = document.createElement('div');
let counterVal = 3;
renderCounter(counterEl, counterVal, (newVal) => { counterVal = newVal; renderCounter(counterEl, counterVal, arguments[2]); });
assertEqual(counterEl.querySelector('.counter-val').textContent, '3', 'renderCounter shows initial value');

const minusBtn = counterEl.querySelectorAll('button')[0];
const plusBtn = counterEl.querySelectorAll('button')[1];
assertEqual(minusBtn.textContent, '−', 'first button is minus');
assertEqual(plusBtn.textContent, '+', 'second button is plus');

// --- renderFactionPanel ---
localStorage.removeItem('airArmorTrackerState');
const panelState = createDefaultState();
const panelEl = document.createElement('div');
renderFactionPanel(panelEl, 'nato', panelState, () => {});

assertEqual(panelEl.querySelectorAll('.hq-row').length, 13, 'renders one row per standalone HQ (3) plus division units (6 + 4)');
assertEqual(panelEl.querySelectorAll('.division-title').length, 2, 'renders one division box per NATO division');
assertEqual([...panelEl.querySelectorAll('.group-box')].filter(b => b.querySelector('.division-title')).reduce((sum, b) => sum + b.querySelectorAll('.hq-row').length, 0), 10, 'division boxes render one row per unit (6 + 4)');
const fwdRow = [...panelEl.querySelectorAll('.hq-row')].find(r => r.querySelector('.hq-name').textContent === 'Fwd HQ');
assertEqual(fwdRow.querySelectorAll('.track-wrap').length, 1, 'cpOnly unit renders only one track (CP)');
assertEqual(fwdRow.querySelector('.label').textContent, 'CP', 'cpOnly unit track is labeled CP');
assertEqual(panelEl.querySelectorAll('.cs-item').length, 1 * 6, 'renders single unified CSP pool for NATO');
assertEqual(!!panelEl.querySelector('.offmap-row'), true, 'renders offmap row');
assertEqual(!!panelEl.querySelector('.sam-row'), true, 'renders SAM row');
assertEqual(!!panelEl.querySelector('.vp-row'), true, 'renders VP row');

const wpPanelEl = document.createElement('div');
renderFactionPanel(wpPanelEl, 'wp', panelState, () => {});
assertEqual(wpPanelEl.querySelectorAll('.hq-row').length, 0, 'WP has no HQ rows');
assertEqual(wpPanelEl.querySelectorAll('.cs-item').length, 1 * 6, 'WP CSP is single nation pool');

// --- group-box grouping ---
assertEqual(panelEl.querySelectorAll('.group-box').length, 6, 'NATO has 6 group boxes (HQ, 2 divisions, offmap+SAM, CSP, VP)');
assertEqual(wpPanelEl.querySelectorAll('.group-box').length, 3, 'WP has 3 group boxes (no HQ box)');
assertEqual(!!panelEl.querySelector('.group-box .hq-row'), true, 'NATO HQ rows live inside a group-box');
assertEqual(!!panelEl.querySelector('.group-box .offmap-row'), true, 'offmap row lives inside a group-box');
assertEqual(!!panelEl.querySelector('.group-box .sam-row'), true, 'SAM row lives inside a group-box');
assertEqual(panelEl.querySelector('.group-box:has(.offmap-row)') === panelEl.querySelector('.group-box:has(.sam-row)'), true, 'offmap and SAM share the same group-box');
assertEqual(!!panelEl.querySelector('.group-box .cs-section'), true, 'CSP section lives inside a group-box');
assertEqual(!!panelEl.querySelector('.group-box .vp-row'), true, 'VP row lives inside a group-box');

document.title = `Tracker Tests — ${passCount} pass, ${failCount} fail`;
</script>
</body>
</html>
