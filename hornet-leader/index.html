<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon_io/favicon-16x16.png">
    <link rel="manifest" href="./favicon_io/site.webmanifest">
    <link rel="icon" href="./favicon_io/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hornet Leader - Campaign Log</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Screen A: Campaign Setup -->
    <div id="setup-screen" class="screen active">
        <header>
            <h1>Hornet Leader</h1>
            <p class="subtitle">캠페인 로그 시트</p>
        </header>
        <main>
            <div class="setup-form">
                <div class="setup-row">
                    <div class="form-group">
                        <label for="difficulty-select">난이도</label>
                        <select id="difficulty-select"></select>
                    </div>
                    <div class="form-group">
                        <label for="region-select">시나리오</label>
                        <select id="region-select" disabled></select>
                    </div>
                    <div class="form-group">
                        <label for="force-select">소속</label>
                        <select id="force-select" disabled></select>
                    </div>
                </div>
                <div id="scenario-info" class="scenario-info hidden"></div>
                <div class="setup-row">
                    <div id="length-group" class="form-group hidden">
                        <label for="length-select">캠페인 길이</label>
                        <select id="length-select"></select>
                    </div>
                </div>
                <div id="length-info" class="length-info hidden"></div>
                <div id="difficulty-rules-group" class="form-group hidden">
                    <label>플레이어 난이도 조정</label>
                    <div id="difficulty-rules-area"></div>
                </div>
                <div id="usmc-options-group" class="form-group hidden">
                    <label>USMC 옵션</label>
                    <div id="usmc-options-area">
                        <label class="rule-option">
                            <input type="checkbox" id="large-deck-marine">
                            <span>Large Deck Marine — 대형 갑판 해군 기체 사용 (표적당 기체 -1)</span>
                        </label>
                    </div>
                </div>
                <div id="aircraft-group" class="form-group hidden">
                    <label>사용 기체 선택</label>
                    <div id="aircraft-options" class="aircraft-options"></div>
                    <button id="toggle-aircraft" class="btn btn-small" type="button">전체 선택/해제</button>
                </div>
                <div id="generate-group" class="generate-group hidden">
                    <button id="generate-btn" class="btn btn-primary">랜덤 비행대</button>
                    <button id="manual-select-btn" class="btn btn-primary">직접 선택</button>
                </div>
                <div id="manual-panel" class="manual-panel hidden">
                    <h3>조종사 직접 선택</h3>
                    <div id="manual-slots"></div>
                    <div class="manual-actions">
                        <button id="manual-confirm-btn" class="btn btn-primary" disabled>확인</button>
                        <button id="manual-cancel-btn" class="btn btn-small">취소</button>
                    </div>
                </div>
            </div>

            <!-- Saved campaigns -->
            <div id="saved-campaigns" class="saved-campaigns">
                <h2>저장된 캠페인</h2>
                <div id="saved-list"></div>
                <div class="import-export-bar">
                    <button id="import-json-btn" class="btn btn-small">JSON 불러오기</button>
                    <button id="export-all-json-btn" class="btn btn-small">전체 JSON 내보내기</button>
                    <input type="file" id="import-json-input" accept=".json" style="display:none">
                </div>
            </div>
        </main>
    </div>

    <!-- Screen B: Campaign Dashboard -->
    <div id="dashboard-screen" class="screen">
        <header>
            <h1 id="campaign-title">Hornet Leader</h1>
            <div class="header-actions">
                <button id="back-to-setup" class="btn btn-small">새 캠페인</button>
                <button id="save-campaign" class="btn btn-small btn-primary">저장</button>
                <button id="export-json-btn" class="btn btn-small">JSON 내보내기</button>
                <button id="full-reset-btn" class="btn btn-small btn-danger">초기화</button>
            </div>
        </header>
        <main>
            <!-- Campaign Info + Mission Log -->
            <section class="section-campaign riveted">
                <h2 class="section-title">캠페인</h2>
                <div class="campaign-stats">
                    <span class="stat-item"><strong>시나리오:</strong> <span id="summary-scenario"></span></span>
                    <span class="stat-item"><strong>기간:</strong> <span id="summary-length"></span></span>
                    <span id="so-display" class="so-badge">SO: 0</span>
                    <span id="vp-display" class="vp-badge">VP: 0</span>
                </div>
                <div id="active-rules" class="active-rules"></div>
                <div id="mission-days"></div>

                <!-- Recon / Intel / Infra -->
                <div class="track-panel">
                    <div class="track-box track-recon">
                        <div class="track-label">Recon</div>
                        <input type="number" class="track-input" id="track-recon" value="0" min="0">
                    </div>
                    <div class="track-box track-intel">
                        <div class="track-label">Intel</div>
                        <input type="number" class="track-input" id="track-intel" value="0" min="0">
                    </div>
                    <div class="track-box track-infra">
                        <div class="track-label">Infra</div>
                        <input type="number" class="track-input" id="track-infra" value="0" min="0">
                    </div>
                </div>
                <!-- Active Improvements -->
                <div id="improvements-panel" class="improvements-panel" style="display:none">
                    <div class="improvements-header">Active Improvements</div>
                    <div id="improvements-list" class="improvements-list"></div>
                </div>
            </section>

            <!-- Squadron -->
            <section class="section-squadron riveted">
                <div class="section-header">
                    <h2 class="section-title">편대</h2>
                    <button id="reroll-btn" class="btn btn-small">다시 뽑기</button>
                </div>
                <table id="squadron-table">
                    <thead>
                        <tr>
                            <th>콜사인</th>
                            <th>기체</th>
                            <th>숙련도</th>
                            <th>상태</th>
                            <th>스트레스</th>
                            <th>경험치</th>
                            <th>쿨다운</th>
                        </tr>
                    </thead>
                    <tbody id="squadron-body"></tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Trait Tooltip -->
    <div id="trait-tooltip"></div>

    <!-- Overkill Modal -->
    <div id="overkill-modal" class="draw-modal-overlay" style="display:none">
        <div class="overkill-modal">
            <div id="overkill-modal-body" class="overkill-modal-body"></div>
            <div id="overkill-modal-actions" class="overkill-modal-actions"></div>
        </div>
    </div>

    <!-- Discard Improvement Modal -->
    <div id="discard-imp-modal" class="draw-modal-overlay" style="display:none">
        <div class="discard-imp-modal">
            <div class="discard-imp-header">
                <h3>Improvement 카드 제거</h3>
                <span id="discard-imp-info" class="discard-imp-info"></span>
            </div>
            <div id="discard-imp-cards" class="discard-imp-cards"></div>
            <div id="discard-imp-actions" class="discard-imp-actions"></div>
        </div>
    </div>

    <!-- Campaign Fail Modal -->
    <div id="campaign-fail-modal" class="draw-modal-overlay" style="display:none">
        <div class="fail-modal">
            <div id="fail-modal-body" class="fail-modal-body"></div>
            <div class="fail-modal-actions">
                <button class="btn btn-small" onclick="closeCampaignFailModal()">확인</button>
            </div>
        </div>
    </div>

    <!-- Target Draw Modal -->
    <div id="target-draw-modal" class="draw-modal-overlay" style="display:none">
        <div class="draw-modal">
            <div class="draw-modal-header">
                <h3>표적 카드 뽑기</h3>
                <span id="draw-recon-info" class="draw-recon-info"></span>
                <button id="draw-modal-close" class="draw-modal-close">&times;</button>
            </div>
            <div id="draw-cards-container" class="draw-cards-container"></div>
            <div id="draw-actions" class="draw-actions"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
